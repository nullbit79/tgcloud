name: Build APK (Docker Stable)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    # 🔥 Build APK pakai Docker resmi Buildozer
    - name: Build APK with Docker
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/home/user/hostcwd \
          -w /home/user/hostcwd \
          kivy/buildozer \
          android debug

    # 📦 Upload hasil APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: tgcloud-apk
        path: bin/*.apk
