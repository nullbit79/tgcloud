name: Build APK (p4a Ultimate Stable)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 📥 Ambil source code
    - name: Checkout
      uses: actions/checkout@v4

    # 🤖 Setup Android SDK
    - name: Setup Android
      uses: android-actions/setup-android@v3

    # 📦 Install SDK (API 30 + build-tools stabil)
    - name: Install SDK Packages
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platform-tools"
        sdkmanager "platforms;android-30"
        sdkmanager "build-tools;30.0.3"

    # 🔧 Install dependency lengkap (FIX autoconf error)
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip git zip unzip openjdk-17-jdk \
          autoconf automake libtool pkg-config \
          build-essential \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          libltdl-dev \
          libsqlite3-dev \
          libbz2-dev \
          libreadline-dev \
          libgdbm-dev \
          libnss3-dev \
          liblzma-dev

    # 🐍 Install python-for-android
    - name: Install p4a
      run: |
        pip install --upgrade pip
        pip install python-for-android

    # ⚙️ Build APK
    - name: Build APK
      run: |
        p4a apk \
          --private . \
          --package=org.tgcloud.app \
          --name "TGCloud" \
          --version 1.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy \
          --android-api 30 \
          --dist-name tgcloud \
          --arch=arm64-v8a

    # 📤 Upload hasil APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: tgcloud-apk
        path: dist/*.apk
